[build]
  command = "pnpm --filter @lumina/app build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_APP_BASEPATH = "/"
  VITE_MARKETING_TARGET = "https://praxis-course.netlify.app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
