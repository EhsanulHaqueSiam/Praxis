[build]
  command = "bash scripts/build-netlify.sh"
  publish = "dist-netlify"

[build.environment]
  NODE_VERSION = "20"

# Dashboard SPA — serve static files, fallback to index.html
[[redirects]]
  from = "/app/assets/*"
  to = "/app/assets/:splat"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Marketing site static assets (CSS, JS, images)
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Marketing site SSR — everything else goes to the serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200

# Cache immutable assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[dev]
  command = "pnpm dev"
  port = 3000
  autoLaunch = false
